name: METADAT Pipeline (TOSEC)

on:
  schedule:
    - cron: '0 12 * * 2'
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test TypeScript compiles
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test || echo "Tests may need setup"